<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="stile.css">
    <title>Sommario</title>
</head>
<body>
    <button onclick="toggleMenu()">☰ Menu</button>
    <nav id="navMenu" class="menu">
        <ul>
            <li><a href="index.html"><h1>Home</h1></a></li>
            <li><a href="pagine.html"><h1>Indice</h1></a></li>
        </ul>
    </nav>
    <nav class="header">
        <h1>Indice</h1>
    </nav>
    <input type="text" id="search" placeholder="Cerca...">
    <script>
    document.getElementById("search").addEventListener("keyup", function() {
    let filter = this.value.toLowerCase();
    let items = document.querySelectorAll("#list li");

    items.forEach(item => {
        item.style.display = item.textContent.toLowerCase().includes(filter)
        ? ""
        : "none";
    });
    });
    </script>
    <div class="text">
        <ul id="list">
            <li><a href="allosauro.html"><h1>Allosaurus</a></h1></a></li>
            <li><a href="anchilosauro.html"><h1>Anchilosaurus</h1></a></li>
            <li><a href="brachiosauro.html"><h1>Brachiosaurus</h1></a></li>
            <li><a href="pterodattilo.html"><h1>Pterodactylus</h1></a></li>
            <li><a href="spinosauro.html"><h1>Spinosaurus</h1></a></li>
            <li><a href="tirannosauro.html"><h1>Tyrannosaurus Rex</h1></a></li>
        </ul>
    </div>
</body>
    <script>
        function toggleMenu(){
            var menu=document.getElementById("navMenu");
            if(menu.style.display === "block"){
                menu.style.display ="none";
            } else{
                menu.style.display="block";
            }
        }
    </script>
</html>
